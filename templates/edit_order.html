<h1>Edit Order Status</h1>

<form method="POST">
    Status:
    <select name="status" required>
        <option value="Pending" {% if order[2] == 'Pending' %}selected{% endif %}>Pending</option>
        <option value="Preparing" {% if order[2] == 'Preparing' %}selected{% endif %}>Preparing</option>
        <option value="Ready" {% if order[2] == 'Ready' %}selected{% endif %}>Ready</option>
        <option value="Completed" {% if order[2] == 'Completed' %}selected{% endif %}>Completed</option>
    </select><br><br>

    <button type="submit">Update Status</button>
</form>
