<!DOCTYPE html>
<html>
<head>
    <title>Order Details</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
    <h2>Restaurant Order System</h2>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/customers">Customers</a>
        <a href="/categories">Categories</a>
        <a href="/menu-items">Menu Items</a>
        <a href="/orders">Orders</a>
        <a href="/order-details">Order Details</a>
    </div>
</div>

<div class="container">
    <h1>Order Summary</h1>

    <table>
        <tr>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Items</th>
            <th>Total Quantity</th>
            <th>Total Amount</th>
        </tr>

        {% for order in orders %}
        <tr>
            <td>{{ order.OrderID }}</td>
            <td>{{ order.Customer }}</td>
            <td>{{ order.Items }}</td>
            <td>{{ order.TotalQuantity }}</td>
            <td>{{ order.TotalAmount }}</td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
