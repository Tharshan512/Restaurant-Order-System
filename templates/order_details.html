<!DOCTYPE html>
<html>
<head>
    <title>Order Details</title>
</head>
<body>
    <h1>Order Details</h1>

    <table border="1" cellpadding="8">
        <tr>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Item Name</th>
            <th>Quantity</th>
            <th>Price</th>
            <th>Subtotal</th>
        </tr>

        {% for order in orders %}
        <tr>
            <td>{{ order.OrderID }}</td>
            <td>{{ order.Customer }}</td>
            <td>{{ order.ItemName }}</td>
            <td>{{ order.Quantity }}</td>
            <td>{{ order.Price }}</td>
            <td>{{ order.Subtotal }}</td>
        </tr>
        {% endfor %}
    </table>

    <br>
    <a href="/">Back to Home</a>
</body>
</html>
