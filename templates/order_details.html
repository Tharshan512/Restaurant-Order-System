<!DOCTYPE html>
<html>
<head>
    <title>Order Details</title>
</head>
<body>
    <h1>Order Details</h1>

    <table border="1" cellpadding="8">
        <tr>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Items</th>
            <th>Total Quantity</th>
            <th>Total Amount</th>
        </tr>

        {% for order in orders %}
        <tr>
            <td>{{ order.OrderID }}</td>
            <td>{{ order.Customer }}</td>
            <td>{{ order.Items }}</td>
            <td>{{ order.TotalQuantity }}</td>
            <td>{{ order.TotalAmount }}</td>
        </tr>
        {% endfor %}
    </table>

    <br>
    <a href="/">Back to Home</a>
</body>
</html>
