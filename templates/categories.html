<!-- category layout -->
<!DOCTYPE html>
<html>
<head>
    <title>Categories</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
    <h2>Restaurant Order System</h2>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/customers">Customers</a>
        <a href="/categories">Categories</a>
        <a href="/menu-items">Menu Items</a>
        <a href="/orders">Orders</a>
        <a href="/order-details">Order Details</a>
    </div>
</div>

<div class="container">
    <h1>Categories</h1>

    <a href="/categories/add" class="btn">Add Category</a>

    <table>
        <tr>
            <th>ID</th>
            <th>Category Name</th>
            <th>Actions</th>
        </tr>

        {% for cat in categories %}
        <tr>
            <td>{{ cat[0] }}</td>
            <td>{{ cat[1] }}</td>
            <td>
                <a href="/categories/edit/{{ cat[0] }}" class="btn">Edit</a>
                <a href="/categories/delete/{{ cat[0] }}" class="btn" onclick="return confirm('Are you sure you want to delete this category?')">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
