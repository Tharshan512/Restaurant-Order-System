<h1>Edit Customer</h1>

<form method="POST">
    First Name: <input type="text" name="first_name" value="{{ customer[1] }}" required><br><br>
    Last Name: <input type="text" name="last_name" value="{{ customer[2] }}" required><br><br>
    Phone: <input type="text" name="phone" value="{{ customer[3] }}" required><br><br>

    <button type="submit">Update Customer</button>
</form>
