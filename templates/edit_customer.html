<!DOCTYPE html>
<html>
<head>
    <title>Edit Customer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
    <h2>Restaurant Order System</h2>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/customers">Customers</a>
        <a href="/categories">Categories</a>
        <a href="/menu-items">Menu Items</a>
        <a href="/orders">Orders</a>
        <a href="/order-details">Order Details</a>
    </div>
</div>

<div class="container">
    <h1>Edit Customer</h1>

    <form method="POST">
        <p>First Name</p>
        <input type="text" name="first_name" value="{{ customer[1] }}" required><br><br>

        <p>Last Name</p>
        <input type="text" name="last_name" value="{{ customer[2] }}" required><br><br>

        <p>Phone</p>
        <input type="text" name="phone" value="{{ customer[3] }}" required><br><br>

        <button type="submit" class="btn">Update Customer</button>
        <a href="/customers" class="btn">Back</a>
    </form>
</div>

</body>
</html>
