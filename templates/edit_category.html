<!DOCTYPE html>
<html>
<head>
    <title>Edit Category</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=2">
</head>
<body>

<div class="navbar">
    <h2>Restaurant System</h2>
    <div class="nav-links">

        <a href="/menu-items">Menu</a>

</div>

<div class="container">
    <h1>Edit Category</h1>

    <form method="POST">
        <label for="category_name">Category Name</label>

    </form>

    <br>
    <a href="/categories" class="btn">Back to Categories</a>
</div>

</body>
</html>
