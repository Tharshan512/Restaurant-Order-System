<!DOCTYPE html>
<html>
<head>
    <title>Manage Order Items</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=2">
</head>
<body>

<div class="navbar">
    <h2>Restaurant System</h2>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/customers">Customers</a>
        <a href="/categories">Categories</a>
        <a href="/menu-items">Menu</a>
        <a href="/orders">Orders</a>
        <a href="/order-details">Order Details</a>
    </div>
</div>

<div class="container">
    <h1>Manage Items for Order {{ order_id }}</h1>

    <form method="POST">
        <label for="menu_item_id">Menu Item</label>
        <select id="menu_item_id" name="menu_item_id" required>
            {% for m in menu_items %}
                <option value="{{ m[0] }}">{{ m[1] }}</option>
            {% endfor %}
        </select>

        <label for="quantity">Quantity</label>
        <input type="number" id="quantity" name="quantity" min="1" required>

        <button type="submit">Add Item</button>
    </form>

    <table>
        <tr>
            <th>Item Name</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Actions</th>
        </tr>

        {% for item in items %}
        <tr>
            <td>{{ item[2] }}</td>
            <td>{{ item[3] }}</td>
            <td>{{ item[4] }}</td>
            <td>
                <a href="/orders/{{ order_id }}/items/edit/{{ item[1] }}" class="btn">Update Quantity</a>
                <a href="/orders/{{ order_id }}/items/delete/{{ item[1] }}" class="btn">Remove</a>
            </td>
        </tr>
        {% endfor %}
    </table>

    <br>
    <a href="/orders" class="btn">Back to Orders</a>
</div>

</body>
</html>
