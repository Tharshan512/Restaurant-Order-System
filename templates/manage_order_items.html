<h1>Manage Items for Order {{ order_id }}</h1>

<form method="POST">
    Menu Item:
    <select name="menu_item_id" required>
        {% for m in menu_items %}
            <option value="{{ m[0] }}">{{ m[1] }}</option>
        {% endfor %}
    </select><br><br>

    Quantity:
    <input type="number" name="quantity" min="1" required><br><br>

    <button type="submit">Add Item</button>
</form>

<br>

<table border="1">
<tr>
    <th>Item Name</th>
    <th>Price</th>
    <th>Quantity</th>
    <th>Actions</th>
</tr>

{% for item in items %}
<tr>
    <td>{{ item[2] }}</td>
    <td>{{ item[3] }}</td>
    <td>{{ item[4] }}</td>
    <td>
        <a href="/orders/{{ order_id }}/items/edit/{{ item[1] }}">Update Quantity</a> |
        <a href="/orders/{{ order_id }}/items/delete/{{ item[1] }}">Remove</a>
    </td>
</tr>
{% endfor %}
</table>

<br>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<a href="/orders">Back to Orders</a>
