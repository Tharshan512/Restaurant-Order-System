<h1>Edit Menu Item</h1>

<form method="POST">
    Item Name: <input type="text" name="item_name" value="{{ menu_item[1] }}" required><br><br>

    Price: <input type="number" step="0.01" name="price" value="{{ menu_item[2] }}" required><br><br>

    Description: <input type="text" name="description" value="{{ menu_item[3] }}" required><br><br>

    Category:
    <select name="category_id" required>
        {% for cat in categories %}
            <option value="{{ cat[0] }}" {% if cat[0] == menu_item[4] %}selected{% endif %}>
                {{ cat[1] }}
            </option>
        {% endfor %}
    </select>
    <br><br>

    <button type="submit">Update Menu Item</button>
</form>

<br>
<a href="/menu-items">Back</a>
