<!DOCTYPE html>
<html>
<head>
    <title>Edit Menu Item</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=2">
</head>
<body>

<div class="navbar">
    <h2>Restaurant System</h2>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/customers">Customers</a>
        <a href="/categories">Categories</a>
        <a href="/menu-items">Menu</a>
        <a href="/orders">Orders</a>
        <a href="/order-details">Order Details</a>
    </div>
</div>

<div class="container">
    <h1>Edit Menu Item</h1>

    <form method="POST">
        <label for="item_name">Item Name</label>
        <input type="text" id="item_name" name="item_name" value="{{ menu_item[1] }}" required>

        <label for="price">Price</label>
        <input type="number" id="price" name="price" step="0.01" value="{{ menu_item[2] }}" required>

        <label for="description">Description</label>
        <input type="text" id="description" name="description" value="{{ menu_item[3] }}" required>

        <label for="category_id">Category</label>
        <select id="category_id" name="category_id" required>
            {% for cat in categories %}
                <option value="{{ cat[0] }}" {% if cat[0] == menu_item[4] %}selected{% endif %}>
                    {{ cat[1] }}
                </option>
            {% endfor %}
        </select>

        <button type="submit">Update Menu Item</button>
    </form>

    <br>
    <a href="/menu-items" class="btn">Back to Menu Items</a>
</div>

</body>
</html>
